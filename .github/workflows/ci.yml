name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore Gw2EventTracker.sln

      - name: Build
        run: dotnet build Gw2EventTracker.sln -c Release -p:Platform=x64 --no-restore

      - name: Test
        run: dotnet test Gw2EventTracker.Tests/Gw2EventTracker.Tests.csproj -c Release -p:Platform=x64 --no-build --verbosity normal
